<section id="publications" style="margin-top: 2rem;">
  <div style="display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem;">
    <h2 style="margin: 0; font-size: 1.5rem; font-weight: 400; color: #111; font-family: Georgia, 'Times New Roman', serif; letter-spacing: -0.5px;">Publications</h2>
    <span id="pub-meta" style="font-size: 14px; color: #828282; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; align-items: center; gap: 10px;">
      <span id="pub-count"></span>
      <button id="pub-refresh" onclick="fetchPubs()" style="font-size: 13px; color: #828282; background: none; border: none; padding: 0; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; font-family: inherit;">↺ refresh</button>
    </span>
  </div>

  <div id="pub-list" style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
    <p style="color: #828282; font-size: 15px;">
      <span id="pub-spinner" style="display: inline-block; width: 12px; height: 12px; border: 2px solid #e0e0e0; border-top-color: #828282; border-radius: 50%; animation: pub-spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px;"></span>
      Loading from PubMed…
    </p>
  </div>
</section>

<style>
  @keyframes pub-spin { to { transform: rotate(360deg); } }

  .pub-entry {
    border-top: 1px solid #e8e8e8;
    padding: 1rem 0;
  }
  .pub-entry:last-child {
    border-bottom: 1px solid #e8e8e8;
  }
  .pub-entry-title {
    margin: 0 0 4px;
    font-size: 15px;
    line-height: 1.5;
    font-weight: normal;
    color: #111;
  }
  .pub-entry-title a {
    color: #2a7ae2;
    text-decoration: none;
  }
  .pub-entry-title a:hover {
    text-decoration: underline;
  }
  .pub-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: normal;
    padding: 1px 7px;
    border-radius: 99px;
    margin-left: 7px;
    vertical-align: middle;
    background: #e8f0fb;
    color: #2a7ae2;
    letter-spacing: 0.01em;
    position: relative;
    top: -1px;
  }
  .pub-entry-authors {
    margin: 0 0 2px;
    font-size: 14px;
    color: #828282;
    line-height: 1.5;
  }
  .pub-entry-authors strong {
    color: #555;
    font-weight: 500;
  }
  .pub-entry-journal {
    margin: 0;
    font-size: 13px;
    color: #828282;
    font-style: italic;
  }
  .pub-entry-journal span {
    font-style: normal;
  }
  #pub-error-msg {
    color: #828282;
    font-size: 15px;
  }
</style>

<script>
(function() {
  var AUTHOR_QUERY = "Hydorn Molly[Author]";
  var DISPLAY_MATCH = "hydorn";

  function fetchPubs() {
    var list = document.getElementById("pub-list");
    var countEl = document.getElementById("pub-count");
    list.innerHTML = '<p style="color:#828282;font-size:15px;"><span style="display:inline-block;width:12px;height:12px;border:2px solid #e0e0e0;border-top-color:#828282;border-radius:50%;animation:pub-spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;"></span>Loading from PubMed\u2026</p>';
    countEl.textContent = "";

    var searchUrl = "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=" + encodeURIComponent(AUTHOR_QUERY) + "&retmode=json&retmax=50&sort=date";

    fetch(searchUrl)
      .then(function(r) { return r.json(); })
      .then(function(searchData) {
        var ids = searchData.esearchresult.idlist;
        if (!ids.length) {
          list.innerHTML = '<p style="color:#828282;font-size:15px;">No publications found.</p>';
          return;
        }
        var summaryUrl = "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=" + ids.join(",") + "&retmode=json";
        return fetch(summaryUrl)
          .then(function(r) { return r.json(); })
          .then(function(summaryData) {
            var results = ids.map(function(id) { return summaryData.result[id]; }).filter(Boolean);
            countEl.textContent = results.length + " paper" + (results.length !== 1 ? "s" : "");

            var html = results.map(function(pub) {
              var authors = (pub.authors || []).map(function(a) {
                return a.name.toLowerCase().indexOf(DISPLAY_MATCH) !== -1
                  ? "<strong>" + a.name + "</strong>"
                  : a.name;
              }).join(", ");

              var year = pub.pubdate ? pub.pubdate.slice(0, 4) : "";
              var isNew = parseInt(year) >= 2024;
              var journal = pub.fulljournalname || pub.source || "";
              var pmid = pub.uid;
              var vol = pub.volume ? " " + pub.volume : "";
              var issue = pub.issue ? "(" + pub.issue + ")" : "";

              return '<div class="pub-entry">' +
                '<p class="pub-entry-title">' +
                  '<a href="https://pubmed.ncbi.nlm.nih.gov/' + pmid + '/" target="_blank" rel="noopener">' + pub.title + '</a>' +
                  (isNew ? '<span class="pub-badge">new</span>' : '') +
                '</p>' +
                '<p class="pub-entry-authors">' + authors + '</p>' +
                '<p class="pub-entry-journal"><em>' + journal + '</em>' + vol + issue + (year ? '<span> &middot; ' + year + '</span>' : '') + '<span> &middot; PMID: ' + pmid + '</span></p>' +
              '</div>';
            }).join("");

            list.innerHTML = html;
          });
      })
      .catch(function() {
        list.innerHTML = '<p id="pub-error-msg">Could not load publications. <button onclick="fetchPubs()" style="font-size:13px;color:#828282;background:none;border:none;padding:0;cursor:pointer;text-decoration:underline;font-family:inherit;">Try again</button></p>';
      });
  }

  document.getElementById("pub-refresh").addEventListener("click", fetchPubs);
  fetchPubs();
})();
</script>
